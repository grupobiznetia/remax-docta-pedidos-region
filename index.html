<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE/MAX DOCTA - Inteligencia Comercial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
        
        :root {
            --remax-red: #E11B22;
            --remax-blue: #003DA5;
        }
        body {
            background-color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }
        .remax-gradient {
            background: linear-gradient(135deg, #003DA5 0%, #002157 100%);
        }
        .filter-btn.active {
            background-color: var(--remax-red);
            color: white;
            border-color: var(--remax-red);
            box-shadow: 0 4px 12px rgba(225, 27, 34, 0.3);
        }
        .card-entry {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
        }
        .card-entry:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--remax-blue);
        }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="remax-gradient text-white py-6 px-4 mb-8 shadow-2xl border-b-4 border-red-600">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-6 w-full md:w-auto">
                <!-- LOGO PNG ORIGINAL INCRUSTADO (BASE64) -->
                <div class="bg-white p-2 rounded-xl shadow-lg border-2 border-white">
                    <img src="logo.png" 
                         alt="RE/MAX Docta" 
                         class="h-16 md:h-20 w-auto object-contain"
                         onerror="this.src='https://storage.googleapis.com/artifacts-api-images/2f8477d2-e3c6-462a-aadb-af378c9d2365'">
                </div>
                
                <div class="h-14 w-px bg-white/20 hidden md:block"></div>
                
                <div>
                    <h1 class="text-2xl md:text-4xl font-black tracking-tighter uppercase italic">Inteligencia Comercial</h1>
                    <p class="text-blue-200 text-sm font-medium tracking-wide">Reporte de Demanda Real • Abril 2026</p>
                </div>
            </div>
            
            <div class="bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/20 text-center md:text-right w-full md:w-auto">
                <p class="text-xs text-blue-100 uppercase font-black tracking-widest mb-1 italic">Agencia Córdoba</p>
                <p class="text-2xl font-bold italic text-white uppercase">RE/MAX DOCTA</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4">
        
        <!-- BUSCADOR -->
        <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-10">
            <div class="flex flex-col lg:flex-row gap-6 items-center">
                <div class="w-full lg:flex-1 relative">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" 
                        placeholder="Buscar zona, agente o descripción de pedido..." 
                        class="w-full pl-14 pr-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all font-medium"
                        onkeyup="filterCards()">
                </div>
                <div class="w-full lg:w-auto flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                    <button onclick="filterType('todos')" class="filter-btn active px-6 py-3 rounded-2xl text-xs font-black border border-slate-200 transition-all whitespace-nowrap uppercase">Todos</button>
                    <button onclick="filterType('Depto')" class="filter-btn bg-white text-slate-600 px-6 py-3 rounded-2xl text-xs font-black border border-slate-200 transition-all whitespace-nowrap uppercase">Deptos</button>
                    <button onclick="filterType('Casa')" class="filter-btn bg-white text-slate-600 px-6 py-3 rounded-2xl text-xs font-black border border-slate-200 transition-all whitespace-nowrap uppercase">Casas</button>
                    <button onclick="filterType('Lote')" class="filter-btn bg-white text-slate-600 px-6 py-3 rounded-2xl text-xs font-black border border-slate-200 transition-all whitespace-nowrap uppercase">Lotes</button>
                </div>
            </div>
        </section>

        <!-- GRID -->
        <div id="requestsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Cargado por JS -->
        </div>

        <div id="noResults" class="hidden text-center py-20">
            <i class="fas fa-search text-5xl text-slate-300 mb-4"></i>
            <h3 class="text-xl font-bold text-slate-800">No se encontraron resultados</h3>
            <p class="text-slate-500">Intenta con otros términos.</p>
        </div>
    </main>

    <script>
        // Datos basados en el documento InformeInteligencia_REMAX_Docta_Abr2026.docx
        const requests = [
            { cat: "Depto", zona: "Alta Cba / Cofico", desc: "1 dorm, max 10 años, con pileta en edificio. Firma próxima semana.", nombre: "+54 9 351 873-3771", tel: "5493518733771", fecha: "01/04", prio: "⭐⭐⭐ EFECTIVO", quote: "u$s 62.000" },
            { cat: "Depto", zona: "Zona Sur / Gral Paz", desc: "Depto buen estado, acepta permuta vehículo nuevo + efectivo.", nombre: "+54 9 351 819-2805", tel: "5493518192805", fecha: "01/04", prio: "⭐⭐ PERMUTA", quote: "u$s 75.000" },
            { cat: "Depto 1D", zona: "Milenica / Harmonie", desc: "Complejo cerrado tipo Milenica, 1 dorm. Hasta 120k.", nombre: "+54 9 351 811-6415", tel: "5493518116415", fecha: "08/04", prio: "⭐⭐ LENDAR", quote: "u$s 120.000" },
            { cat: "Depto 1D", zona: "Centro / Gral Paz / Alberdi", desc: "PLATA EN MANO, CLIENTE FILTRADO. 1 dorm con ascensor y gas.", nombre: "Daniela Asesora", tel: "5493513292415", fecha: "10/04", prio: "⭐⭐⭐ EFECTIVO", quote: "u$s 52.000" },
            { cat: "Depto 2D", zona: "Gral Paz / Z. Norte", desc: "Calidad, cochera, orientado al SUR. Inversor.", nombre: "Martin Trejo", tel: "5493515510657", fecha: "11/04", prio: "⭐⭐⭐ CONTADO", quote: "u$s 180.000" },
            { cat: "Casa 3D", zona: "Río Ceballos / Unquillo", desc: "RESERVA CAÍDA. 3 dorm, patio y pileta. PARA COMPRAR YA.", nombre: "+54 9 351 346-2754", tel: "5493513462754", fecha: "08/04", prio: "⭐⭐⭐ URGENTE", quote: "u$s 130.000" },
            { cat: "Casa", zona: "V. Belgrano / Urca", desc: "Cocina con isla, galería, cochera, escritura.", nombre: "Ana Ruffa", tel: "5493512362544", fecha: "06/04", prio: "⭐⭐ CALIFICADO", quote: "u$s 160.000" },
            { cat: "Casa 2D", zona: "Alto Alberdi / Obrero", desc: "Mudanza inmediata por venta propia.", nombre: "Axel Gadau", tel: "5493513028213", fecha: "11/04", prio: "⭐⭐⭐ URGENTE", quote: "u$s 60.000" },
            { cat: "Lote", zona: "Villa Warcalde", desc: "500-600 m2, PLANO requisito excluyente.", nombre: "+54 9 351 258-1359", tel: "5493512581359", fecha: "07/04", prio: "⭐⭐ CALIFICADO", quote: "u$s 180.000" },
            { cat: "Galpón", zona: "Zona Norte / Circunvalación", desc: "600-1000 m2. Entrada camiones, oficinas.", nombre: "G. Santa Fe", tel: "5493516629988", fecha: "13/04", prio: "⭐⭐⭐ EMPRESA", quote: "Consultar" }
        ];

        function renderCards(data) {
            const grid = document.getElementById('requestsGrid');
            const noRes = document.getElementById('noResults');
            grid.innerHTML = '';

            if (data.length === 0) {
                noRes.classList.remove('hidden');
                return;
            }
            noRes.classList.add('hidden');

            data.forEach(item => {
                let badgeClass = "bg-slate-100 text-slate-500 border-slate-200";
                if(item.prio.includes("⭐⭐⭐")) badgeClass = "bg-red-50 text-red-600 border-red-200";
                else if(item.prio.includes("⭐⭐")) badgeClass = "bg-blue-50 text-blue-600 border-blue-200";

                const card = document.createElement('div');
                card.className = "card-entry bg-white rounded-[2rem] p-6 flex flex-col cursor-default shadow-sm";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-5">
                        <span class="text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border ${badgeClass}">${item.prio}</span>
                        <span class="text-[11px] text-slate-400 font-bold">${item.fecha}</span>
                    </div>
                    
                    <div class="mb-4">
                        <h4 class="text-[10px] font-black text-red-600 uppercase tracking-tighter mb-1">${item.cat}</h4>
                        <h3 class="text-xl font-bold text-slate-900 leading-tight">${item.zona}</h3>
                    </div>
                    
                    <p class="text-slate-600 mb-6 flex-1 italic text-[0.95rem]">"${item.desc}"</p>
                    
                    <div class="bg-slate-50 border border-slate-200 p-4 rounded-2xl mb-6">
                        <p class="text-[11px] font-black text-slate-900 uppercase tracking-wide">Ppto Máximo: ${item.quote}</p>
                    </div>
                    
                    <div class="flex items-center justify-between pt-4 border-t border-slate-100">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-black text-[10px] shadow-lg">
                                RX
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">Referente</span>
                                <span class="text-[12px] font-bold text-slate-800 truncate max-w-[120px]">${item.nombre}</span>
                            </div>
                        </div>
                        <a href="https://wa.me/${item.tel}" 
                           target="_blank"
                           class="flex items-center gap-2 bg-green-500 text-white px-4 py-2.5 rounded-xl text-[10px] font-black hover:bg-green-600 transition-all shadow-md active:scale-95">
                            <i class="fab fa-whatsapp text-sm"></i> CHAT
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterCards() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = requests.filter(r => 
                r.zona.toLowerCase().includes(query) || 
                r.desc.toLowerCase().includes(query) || 
                r.nombre.toLowerCase().includes(query) ||
                r.cat.toLowerCase().includes(query)
            );
            renderCards(filtered);
        }

        function filterType(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');
            
            if(type === 'todos') renderCards(requests);
            else {
                const filtered = requests.filter(r => r.cat.toLowerCase().includes(type.toLowerCase()));
                renderCards(filtered);
            }
        }

        window.onload = () => renderCards(requests);
    </script>
</body>
</html>
